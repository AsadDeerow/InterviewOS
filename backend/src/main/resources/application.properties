spring.application.name=interviewos
spring.profiles.default=dev
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

jwt.secret=${JWT_SECRET}

app.auth.token.expiration-seconds=3600
app.cors.allowed-origins=http://localhost:3000
app.base-url=${APP_BASE_URL:http://localhost:3000}

email.enabled=${EMAIL_ENABLED:true}
email.provider=${EMAIL_PROVIDER:resend}
email.from=${EMAIL_FROM:no-reply@interviewos.dev}
email.reply-to=${EMAIL_REPLY_TO:support@interviewos.dev}
email.resend.api-key=${RESEND_API_KEY:}

server.tomcat.max-http-form-post-size=2MB
server.tomcat.max-swallow-size=2MB
spring.servlet.multipart.max-request-size=2MB
spring.servlet.multipart.max-file-size=2MB
server.max-http-request-header-size=16KB

app.evaluation.max-answer-length=2000
app.evaluation.openai.base-url=https://api.openai.com/v1
app.evaluation.openai.model=gpt-5.4-2026-03-05
app.evaluation.openai.timeout-seconds=30

app.billing.stripe.base-url=https://api.stripe.com
stripe.secret.key=${STRIPE_SECRET_KEY}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET}
app.billing.stripe.success-url=${STRIPE_SUCCESS_URL:http://localhost:3000/dashboard?billing=success}
app.billing.stripe.cancel-url=${STRIPE_CANCEL_URL:http://localhost:3000/dashboard?billing=cancel}
app.billing.stripe.timeout-seconds=30
app.billing.stripe.webhook-tolerance-seconds=300

stripe.price.basic.monthly=${STRIPE_PRICE_BASIC_MONTHLY:}
stripe.price.basic.yearly=${STRIPE_PRICE_BASIC_YEARLY:}
stripe.price.pro.monthly=${STRIPE_PRICE_PRO_MONTHLY:}
stripe.price.pro.yearly=${STRIPE_PRICE_PRO_YEARLY:}
