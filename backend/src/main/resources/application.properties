spring.application.name=interviewos
spring.profiles.default=dev
spring.config.import=optional:file:./application-local.properties
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

jwt.secret=${JWT_SECRET}

app.auth.token.expiration-seconds=3600
app.cors.allowed-origins=http://localhost:3000

server.tomcat.max-http-form-post-size=2MB
server.tomcat.max-swallow-size=2MB
spring.servlet.multipart.max-request-size=2MB
spring.servlet.multipart.max-file-size=2MB
server.max-http-request-header-size=16KB

app.evaluation.max-answer-length=2000
app.evaluation.openai.base-url=https://api.openai.com/v1
app.evaluation.openai.model=gpt-5.4-2026-03-05
app.evaluation.openai.timeout-seconds=30
